<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Palette Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F0F0D;
      --surface: #181816;
      --surface2: #1F1F1C;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text: #E8E4DC;
      --muted: #6B6B62;
      --accent: #C8F059;
      --accent-dark: #0F0F0D;
      --serif: 'Instrument Serif', serif;
      --sans: 'Instrument Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-columns: 380px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      grid-column: 1 / -1;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 10px;
    }

    .topbar-logo {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-style: italic;
      letter-spacing: -0.01em;
    }

    .topbar-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .topbar-tag {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: 2px;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }

    .sidebar-footer {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    /* ── Section ── */
    .section {
      margin-bottom: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .section-header:hover { background: var(--surface); }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .section-title-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border-hover);
    }

    .section-title-dot.filled { background: var(--accent); }

    .section-chevron {
      color: var(--muted);
      font-size: 0.6rem;
      transition: transform 0.2s;
    }

    .section.open .section-chevron { transform: rotate(180deg); }

    .section-body {
      display: none;
      padding: 4px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .section.open .section-body { display: block; }

    /* ── Form elements ── */
    .field { margin-top: 14px; }

    .field-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
      display: block;
    }

    .field-label span {
      color: var(--muted);
      font-size: 0.6rem;
      letter-spacing: 0;
      text-transform: none;
      margin-left: 4px;
      opacity: 0.6;
    }

    textarea, input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.8rem;
      line-height: 1.6;
      outline: none;
      resize: none;
      transition: border-color 0.15s;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: var(--border-hover);
    }

    textarea::placeholder, input::placeholder { color: var(--muted); font-style: italic; }

    /* ── Tag input ── */
    .tag-input-wrap {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      cursor: text;
      transition: border-color 0.15s;
      min-height: 42px;
      align-items: center;
    }

    .tag-input-wrap:focus-within { border-color: var(--border-hover); }

    .tag {
      background: rgba(200, 240, 89, 0.12);
      color: var(--accent);
      border: 1px solid rgba(200, 240, 89, 0.2);
      border-radius: 4px;
      padding: 3px 8px 3px 10px;
      font-size: 0.72rem;
      display: flex;
      align-items: center;
      gap: 6px;
      animation: tagIn 0.15s ease;
    }

    @keyframes tagIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .tag-remove {
      cursor: pointer;
      opacity: 0.5;
      font-size: 0.75rem;
      line-height: 1;
      transition: opacity 0.1s;
    }

    .tag-remove:hover { opacity: 1; }

    .tag-inner-input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.78rem;
      min-width: 80px;
      flex: 1;
      padding: 2px 0;
    }

    .tag-inner-input::placeholder { color: var(--muted); font-style: italic; }

    .tag-hint {
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 5px;
      opacity: 0.7;
    }

    /* ── Segmented control ── */
    .segmented {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px;
      gap: 2px;
    }

    .seg-btn {
      flex: 1;
      padding: 8px 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
      text-align: center;
    }

    .seg-btn.active {
      background: var(--text);
      color: var(--bg);
    }

    /* ── Combination grid ── */
    .combo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .combo-card {
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 8px 8px;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    .combo-card:hover { border-color: var(--border-hover); }

    .combo-card.active {
      border-color: var(--accent);
      background: rgba(200, 240, 89, 0.06);
    }

    .combo-diagram {
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 22px;
    }

    .combo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .combo-name {
      font-size: 0.6rem;
      text-align: center;
      color: var(--muted);
      line-height: 1.3;
    }

    .combo-card.active .combo-name { color: var(--accent); }

    /* ── Colour count ── */
    .count-row {
      display: flex;
      gap: 5px;
    }

    .count-btn {
      flex: 1;
      padding: 8px 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .count-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .count-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── Generate button ── */
    .gen-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--accent-dark);
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .gen-btn:hover { opacity: 0.88; }
    .gen-btn:active { transform: scale(0.99); }
    .gen-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Output area ── */
    .output {
      overflow-y: auto;
      padding: 36px 40px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* ── Empty state ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: var(--muted);
    }

    .empty-swatches {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .empty-swatch {
      border-radius: 6px;
      background: var(--surface2);
    }

    .empty p {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.8;
    }

    /* ── Palette result ── */
    .result-header { display: flex; flex-direction: column; gap: 8px; }

    .result-eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-name {
      font-family: var(--serif);
      font-size: 2rem;
      font-style: italic;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .result-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.8;
      max-width: 560px;
      margin-top: 4px;
    }

    .result-reasoning {
      font-size: 0.73rem;
      color: rgba(200, 240, 89, 0.7);
      line-height: 1.8;
      max-width: 560px;
      border-left: 2px solid rgba(200, 240, 89, 0.2);
      padding-left: 14px;
    }

    /* ── Swatches ── */
    .swatches { display: flex; gap: 14px; flex-wrap: wrap; }

    .swatch {
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      animation: swatchIn 0.35s ease both;
    }

    @keyframes swatchIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .swatch-color {
      width: 110px;
      height: 160px;
      border-radius: 8px;
      transition: transform 0.2s;
      position: relative;
    }

    .swatch:hover .swatch-color { transform: translateY(-5px); }

    .swatch-name {
      font-family: var(--serif);
      font-size: 0.95rem;
      line-height: 1.2;
    }

    .swatch-hex {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .swatch-role {
      font-size: 0.6rem;
      color: var(--muted);
      opacity: 0.7;
    }

    /* ── Usage strip ── */
    .usage-section { display: flex; flex-direction: column; gap: 12px; }

    .usage-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .usage-strip {
      display: flex;
      height: 40px;
      border-radius: 6px;
      overflow: hidden;
      max-width: 640px;
    }

    /* ── Mockup ── */
    .mockup-section { display: flex; flex-direction: column; gap: 12px; }

    .mockup-card {
      max-width: 480px;
      border-radius: 10px;
      padding: 32px 36px;
      transition: all 0.4s ease;
    }

    .mockup-tag {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.7;
    }

    .mockup-heading {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-style: italic;
      line-height: 1.15;
      margin-bottom: 10px;
    }

    .mockup-body {
      font-size: 0.76rem;
      line-height: 1.8;
      margin-bottom: 24px;
      opacity: 0.65;
    }

    .mockup-btn {
      display: inline-block;
      padding: 11px 24px;
      border-radius: 5px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Loading ── */
    .loading-swatches { display: flex; gap: 14px; }

    .loading-swatch {
      width: 110px; height: 160px;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.3s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--text);
      color: var(--bg);
      padding: 9px 18px;
      border-radius: 5px;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      max-width: 640px;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-logo">Palette</div>
    <div class="topbar-dot"></div>
    <div class="topbar-tag">Brand colour generator</div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-scroll" id="sidebarScroll">

      <!-- Brand Strategy -->
      <div class="section open" id="sec-strategy">
        <div class="section-header" onclick="toggleSection('sec-strategy')">
          <div class="section-title">
            <div class="section-title-dot" id="dot-strategy"></div>
            Brand Strategy
          </div>
          <div class="section-chevron">▼</div>
        </div>
        <div class="section-body">

          <div class="field">
            <label class="field-label">Brand attributes <span>3 max · press Enter</span></label>
            <div class="tag-input-wrap" id="wrap-attributes" onclick="focusTagInput('attributes')">
              <input class="tag-inner-input" id="tag-attributes" placeholder="e.g. human, bold, playful" maxlength="30"/>
            </div>
            <div class="tag-hint">These have the most impact on colour direction</div>
          </div>

          <div class="field">
            <label class="field-label">Brand personality <span>optional</span></label>
            <input type="text" id="personality" placeholder="e.g. A trusted friend who challenges you"/>
          </div>

          <div class="field">
            <label class="field-label">Target audience <span>press Enter to add</span></label>
            <div class="tag-input-wrap" id="wrap-audiences" onclick="focusTagInput('audiences')">
              <input class="tag-inner-input" id="tag-audiences" placeholder="e.g. young professionals"/>
            </div>
          </div>

          <div class="field">
            <label class="field-label">Positioning <span>optional</span></label>
            <textarea id="positioning" rows="2" placeholder="e.g. The premium alternative to traditional banking, built for the digital generation"></textarea>
          </div>

          <div class="field">
            <label class="field-label">Brand story <span>optional</span></label>
            <textarea id="brandstory" rows="3" placeholder="What's the origin, tension, or belief that drives this brand?"></textarea>
          </div>

        </div>
      </div>

      <!-- Visual Direction -->
      <div class="section open" id="sec-visual">
        <div class="section-header" onclick="toggleSection('sec-visual')">
          <div class="section-title">
            <div class="section-title-dot" id="dot-visual"></div>
            Visual Direction
          </div>
          <div class="section-chevron">▼</div>
        </div>
        <div class="section-body">

          <div class="field">
            <label class="field-label">Colour style</label>
            <div class="segmented">
              <button class="seg-btn active" data-style="soft" onclick="selectStyle(this)">
                Soft &amp; Muted
              </button>
              <button class="seg-btn" data-style="loud" onclick="selectStyle(this)">
                Loud &amp; Bright
              </button>
            </div>
          </div>

          <div class="field">
            <label class="field-label">Colour combination</label>
            <div class="combo-grid" id="comboGrid">

              <div class="combo-card active" data-combo="Analogous" onclick="selectCombo(this)">
                <div class="combo-diagram">
                  <div class="combo-dot" style="background:#7EB8F7"></div>
                  <div class="combo-dot" style="background:#7EF7C4"></div>
                  <div class="combo-dot" style="background:#7EF795"></div>
                </div>
                <div class="combo-name">Analogous</div>
              </div>

              <div class="combo-card" data-combo="Triadic" onclick="selectCombo(this)">
                <div class="combo-diagram">
                  <div class="combo-dot" style="background:#F77E7E"></div>
                  <div class="combo-dot" style="background:#7EF77E"></div>
                  <div class="combo-dot" style="background:#7E7EF7"></div>
                </div>
                <div class="combo-name">Triadic</div>
              </div>

              <div class="combo-card" data-combo="Monochromatic" onclick="selectCombo(this)">
                <div class="combo-diagram">
                  <div class="combo-dot" style="background:#2a5298;width:8px;height:8px"></div>
                  <div class="combo-dot" style="background:#4472c4;width:10px;height:10px"></div>
                  <div class="combo-dot" style="background:#8faadc"></div>
                </div>
                <div class="combo-name">Mono&shy;chromatic</div>
              </div>

              <div class="combo-card" data-combo="Complementary" onclick="selectCombo(this)">
                <div class="combo-diagram">
                  <div class="combo-dot" style="background:#F77E7E"></div>
                  <div class="combo-dot" style="background:#555" style="width:6px;height:6px"></div>
                  <div class="combo-dot" style="background:#7EF7C4"></div>
                </div>
                <div class="combo-name">Comple&shy;mentary</div>
              </div>

              <div class="combo-card" data-combo="Dynamic" onclick="selectCombo(this)">
                <div class="combo-diagram" style="gap:2px">
                  <div class="combo-dot" style="background:#F7D47E;width:8px;height:8px"></div>
                  <div class="combo-dot" style="background:#F77EBC"></div>
                  <div class="combo-dot" style="background:#7EB8F7;width:8px;height:8px"></div>
                  <div class="combo-dot" style="background:#C8F059;width:7px;height:7px"></div>
                </div>
                <div class="combo-name">Dynamic</div>
              </div>

              <div class="combo-card" data-combo="Monocolor" onclick="selectCombo(this)">
                <div class="combo-diagram">
                  <div class="combo-dot" style="background:#1a1a18;width:14px;height:14px"></div>
                  <div class="combo-dot" style="background:#F5F0E8;width:8px;height:8px"></div>
                </div>
                <div class="combo-name">Mono&shy;color</div>
              </div>

            </div>
          </div>

          <div class="field">
            <label class="field-label">Number of colours</label>
            <div class="count-row" id="countRow">
              <button class="count-btn" onclick="selectCount(this)" data-n="4">4</button>
              <button class="count-btn active" onclick="selectCount(this)" data-n="5">5</button>
              <button class="count-btn" onclick="selectCount(this)" data-n="6">6</button>
              <button class="count-btn" onclick="selectCount(this)" data-n="7">7</button>
            </div>
          </div>

        </div>
      </div>

      <div style="height:16px"></div>

    </div><!-- /sidebar-scroll -->

    <div class="sidebar-footer">
      <button class="gen-btn" id="genBtn" onclick="generate()">Generate palette →</button>
    </div>
  </aside>

  <!-- Output -->
  <main class="output" id="output">
    <div class="empty" id="emptyState">
      <div class="empty-swatches">
        <div class="empty-swatch" style="width:60px;height:100px;opacity:.2"></div>
        <div class="empty-swatch" style="width:60px;height:120px;opacity:.35"></div>
        <div class="empty-swatch" style="width:60px;height:140px;opacity:.5"></div>
        <div class="empty-swatch" style="width:60px;height:120px;opacity:.35"></div>
        <div class="empty-swatch" style="width:60px;height:100px;opacity:.2"></div>
      </div>
      <p>Fill in your brand strategy and visual direction<br/>to generate a considered colour palette</p>
    </div>
  </main>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──
  const state = {
    tags: { attributes: [], audiences: [] },
    style: 'soft',
    combo: 'Analogous',
    count: 5
  };

  // ── Sections ──
  function toggleSection(id) {
    document.getElementById(id).classList.toggle('open');
  }

  // ── Tag inputs ──
  function focusTagInput(name) {
    document.getElementById('tag-' + name).focus();
  }

  ['attributes', 'audiences'].forEach(name => {
    const limits = { attributes: 3, audiences: 5 };
    const input = document.getElementById('tag-' + name);

    input.addEventListener('keydown', e => {
      if ((e.key === 'Enter' || e.key === ',') && input.value.trim()) {
        e.preventDefault();
        const val = input.value.trim().replace(/,$/, '');
        if (!val || state.tags[name].includes(val)) return;
        if (state.tags[name].length >= limits[name]) return;
        state.tags[name].push(val);
        renderTags(name);
        input.value = '';
        updateDots();
      }
      if (e.key === 'Backspace' && !input.value && state.tags[name].length) {
        state.tags[name].pop();
        renderTags(name);
        updateDots();
      }
    });
  });

  function renderTags(name) {
    const wrap = document.getElementById('wrap-' + name);
    const input = document.getElementById('tag-' + name);
    wrap.querySelectorAll('.tag').forEach(t => t.remove());
    state.tags[name].forEach((val, i) => {
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.innerHTML = `${val}<span class="tag-remove" onclick="removeTag('${name}',${i})">✕</span>`;
      wrap.insertBefore(tag, input);
    });
  }

  function removeTag(name, i) {
    state.tags[name].splice(i, 1);
    renderTags(name);
    updateDots();
  }

  // ── Segmented ──
  function selectStyle(btn) {
    document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.style = btn.dataset.style;
  }

  // ── Combo ──
  function selectCombo(card) {
    document.querySelectorAll('.combo-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    state.combo = card.dataset.combo;
  }

  // ── Count ──
  function selectCount(btn) {
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.count = parseInt(btn.dataset.n);
  }

  // ── Dots (fill when section has content) ──
  function updateDots() {
    const hasStrategy = state.tags.attributes.length > 0
      || document.getElementById('personality').value.trim()
      || state.tags.audiences.length > 0
      || document.getElementById('positioning').value.trim()
      || document.getElementById('brandstory').value.trim();
    document.getElementById('dot-strategy').classList.toggle('filled', hasStrategy);
    document.getElementById('dot-visual').classList.add('filled');
  }

  ['personality','positioning','brandstory'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateDots);
  });

  updateDots();

  // ── Generate ──
  async function generate() {
    const btn = document.getElementById('genBtn');
    const output = document.getElementById('output');

    // Gather inputs
    const attributes = state.tags.attributes.join(', ');
    const audiences = state.tags.audiences.join(', ');
    const personality = document.getElementById('personality').value.trim();
    const positioning = document.getElementById('positioning').value.trim();
    const brandstory = document.getElementById('brandstory').value.trim();

    if (!attributes && !personality && !positioning && !brandstory && !audiences.length) {
      showToast('Add at least one brand input to generate');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Generating…';

    output.innerHTML = `
      <div>
        <div style="font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:20px">Analysing brand inputs…</div>
        <div class="loading-swatches">
          ${Array(state.count).fill('<div class="loading-swatch"></div>').join('')}
        </div>
      </div>`;

    // Build prompt
    const strategyParts = [];
    if (attributes) strategyParts.push(`Brand attributes: ${attributes}`);
    if (personality) strategyParts.push(`Brand personality: ${personality}`);
    if (audiences) strategyParts.push(`Target audiences: ${audiences}`);
    if (positioning) strategyParts.push(`Positioning: ${positioning}`);
    if (brandstory) strategyParts.push(`Brand story: ${brandstory}`);

    const prompt = `You are a senior brand designer and colour strategist with an exceptional eye for colour.

BRAND INPUTS:
${strategyParts.join('\n')}

VISUAL CONSTRAINTS (follow these strictly):
- Colour style: ${state.style === 'soft' ? 'Soft & muted — desaturated, quiet, refined tones' : 'Loud & bright — saturated, energetic, bold tones'}
- Colour combination type: ${state.combo}
- Number of colours: ${state.count}

YOUR TASK:
Step 1 — Analyse the brand inputs. Identify the emotional territory, visual world, and cultural references this brand lives in. Write 1-2 sentences on this.

Step 2 — Generate exactly ${state.count} colours for this brand's palette. The colours MUST follow the ${state.combo} combination method and the ${state.style === 'soft' ? 'soft & muted' : 'loud & bright'} style. Do not break these constraints.

Step 3 — Name each colour with an evocative 2-3 word name (like "Fresh Stem", "Mulberry Bark", "Morning Lagoon"). Names should feel poetic, specific, and brand-appropriate.

Return ONLY valid JSON (no markdown, no explanation):
{
  "paletteName": "3-5 word evocative palette title",
  "paletteDescription": "1-2 sentences on what these colours express for this brand",
  "brandTerritory": "1-2 sentences from step 1 analysis",
  "colors": [
    {
      "name": "...",
      "hex": "#XXXXXX",
      "role": "e.g. Primary background / Accent / Body text / Highlight",
      "weight": 25
    }
  ]
}
Weights must sum to 100.`;

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await res.json();
      const text = data.content.map(i => i.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const palette = JSON.parse(clean);
      renderResult(palette);

    } catch(err) {
      output.innerHTML = `<div style="color:#e05a5a;font-size:.75rem;padding:20px">Something went wrong — try again.</div>`;
      console.error(err);
    }

    btn.disabled = false;
    btn.textContent = 'Generate palette →';
  }

  function renderResult(p) {
    const output = document.getElementById('output');

    const swatchesHTML = p.colors.map((c, i) => `
      <div class="swatch" style="animation-delay:${i*0.07}s" onclick="copyHex('${c.hex}')">
        <div class="swatch-color" style="background:${c.hex}"></div>
        <div class="swatch-name">${c.name}</div>
        <div class="swatch-hex">${c.hex.toUpperCase()}</div>
        <div class="swatch-role">${c.role}</div>
      </div>`).join('');

    const stripHTML = p.colors.map(c =>
      `<div style="flex:${c.weight};background:${c.hex}" title="${c.name} — ${c.weight}%"></div>`
    ).join('');

    const sorted = [...p.colors].sort((a,b) => b.weight - a.weight);
    const bg = sorted[0]?.hex || '#fff';
    const accent = sorted[1]?.hex || '#000';
    const bodyText = getContrast(bg);
    const btnText = getContrast(accent);

    output.innerHTML = `
      <div class="result-header">
        <div class="result-eyebrow">Generated palette</div>
        <div class="result-name">${p.paletteName}</div>
        <div class="result-desc">${p.paletteDescription}</div>
        ${p.brandTerritory ? `<div class="result-reasoning">${p.brandTerritory}</div>` : ''}
      </div>

      <div class="swatches">${swatchesHTML}</div>

      <div class="divider"></div>

      <div class="usage-section">
        <div class="usage-label">Usage ratio</div>
        <div class="usage-strip">${stripHTML}</div>
      </div>

      <div class="mockup-section">
        <div class="usage-label">Brand preview</div>
        <div class="mockup-card" style="background:${bg};color:${bodyText}">
          <div class="mockup-tag" style="color:${accent}">${p.paletteName}</div>
          <div class="mockup-heading">Made with intention</div>
          <div class="mockup-body">Every colour in this palette has a role. Together they create a visual language that feels considered, coherent, and true to the brand.</div>
          <div class="mockup-btn" style="background:${accent};color:${btnText}">Explore →</div>
        </div>
      </div>
    `;
  }

  function getContrast(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return (0.299*r + 0.587*g + 0.114*b)/255 > 0.5 ? '#0F0F0D' : '#F5F0E8';
  }

  function copyHex(hex) {
    navigator.clipboard.writeText(hex.toUpperCase());
    showToast(hex.toUpperCase() + ' copied');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
